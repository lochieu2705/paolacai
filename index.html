<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Páo Lá Cải</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Roboto',sans-serif;
}

body{
background:#f3f3f3;
color:#222;
}

.wrapper{
width:1140px;
margin:auto;
}

/* HEADER */

.header{
background:#fff;
}

.top-header{
height:82px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:54px;
font-weight:700;
color:#c40d00;
line-height:1;
}

.logo span{
color:#30b4c5;
}

.logo span{
color:#b48a00;
}


.right-header{
display:flex;
align-items:center;
gap:25px;
font-size:14px;
color:#666;
}

.user-icon{
width:36px;
height:36px;
border:1px solid #ddd;
border-radius:50%;
}


.menu{
background:#27b2c5;
height:56px;
}

.menu-inner{
display:flex;
align-items:center;
height:100%;
}

.menu-links{
display:flex;
gap:35px;
}

.menu-links a{
color:#fff;
font-size:19px;
font-weight:500;
text-decoration:none;
}

.search{
margin-left:auto;
display:flex;
align-items:center;
}

.search input{
width:290px;
height:38px;
border:none;
outline:none;
padding:0 15px;
background:#3abfd0;
color:#fff;
border-radius:4px 0 0 4px;
}

.search input::placeholder{
color:#dff6f9;
}

.search button{
height:38px;
width:48px;
border:none;
background:#22a4b7;
color:white;
cursor:pointer;
}

.hamburger{
margin-left:15px;
font-size:28px;
color:white;
}


.content{
display:grid;
grid-template-columns:740px 350px;
gap:40px;
margin-top:22px;
}


.featured{
display:grid;
grid-template-columns:1fr 1.5fr;
gap:25px;
align-items:start;
}

.featured-title{
display:block;
font-size:28px;
font-weight:700;
line-height:1.3;
margin-bottom:12px;
text-decoration:none;
color:#111;
}

.featured-title:hover{
color:#27b2c5;
}

.featured-desc{
font-size:15px;
color:#666;
line-height:1.8;
}

.featured img{
width:100%;
height:365px;
object-fit:cover;
}

.side-news{
background:#fff;
padding:5px 0;
}

.side-item{
padding:14px 0;
border-bottom:1px solid #ececec;
font-size:16px;
line-height:1.5;
cursor:pointer;
}

.side-item:hover{
color:#ff6600;
}


.small-news{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:22px;
margin-top:22px;
}

.news-card img{
width:100%;
height:130px;
object-fit:cover;
}

.news-card h3{
font-size:16px;
font-weight:500;
margin-top:10px;
line-height:1.4;
}

.tags{
margin-top:22px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.tag{
background:#fff;
border-radius:30px;
padding:10px 18px;
font-size:15px;
border:1px solid #ececec;
}


@media (max-width:1024px){

.wrapper{
width:95%;
}

.content{
grid-template-columns:1fr;
}

.side-news{
display:none;
}

.featured{
grid-template-columns:1fr;
}

.featured img{
height:300px;
}

.small-news{
grid-template-columns:repeat(2,1fr);
}

}

@media (max-width:768px){

.top-header{
height:auto;
padding:12px 0;
flex-direction:column;
gap:10px;
}

.logo{
font-size:38px;
text-align:center;
}

.right-header{
gap:12px;
font-size:13px;
}

.menu{
height:auto;
padding:10px 0;
}

.menu-inner{
flex-direction:column;
gap:12px;
}

.menu-links{
width:100%;
justify-content:center;
gap:18px;
flex-wrap:wrap;
}

.menu-links a{
font-size:16px;
}

.search{
width:100%;
margin:0;
}

.search input{
width:100%;
}

.search button{
flex-shrink:0;
}

.hamburger{
display:none;
}

.content{
margin-top:15px;
}

.featured-title{
font-size:24px;
}

.featured-desc{
font-size:14px;
}

.featured img{
height:220px;
}

.small-news{
grid-template-columns:1fr;
}

.news-card img{
height:190px;
}

.tags{
justify-content:center;
}

.tag{
font-size:14px;
padding:8px 14px;
}

}

@media (max-width:480px){

.logo{
font-size:30px;
}

.featured-title{
font-size:21px;
}

.featured img{
height:180px;
}

.news-card img{
height:160px;
}

.menu-links{
gap:12px;
}

.menu-links a{
font-size:14px;
}

.search input{
height:36px;
}

.search button{
height:36px;
width:44px;
}

}
.article-page{
display:none;
background:#fff;
padding:30px;
margin-top:20px;
border-radius:8px;
}

.article-page h1{
font-size:38px;
margin-bottom:20px;
line-height:1.3;
}

.article-page p{
font-size:18px;
line-height:1.8;
margin-bottom:18px;
}

.back-btn{
display:inline-block;
margin-bottom:20px;
padding:10px 18px;
background:#27b2c5;
color:#fff;
text-decoration:none;
border-radius:5px;
}

.article-page{
display:none;
background:#fff;
padding:30px 0 60px;
}

.article-container{
max-width:760px;
margin:auto;
padding:0 15px;
}

.article-category{
text-align:center;
font-size:13px;
letter-spacing:4px;
color:#666;
margin-bottom:25px;
}

.article-title{
font-size:54px;
font-weight:700;
line-height:1.25;
text-align:center;
margin-bottom:25px;
font-family:Georgia,serif;
}

.article-author{
text-align:center;
font-size:16px;
font-weight:500;
color:#333;
margin-bottom:20px;
}

.article-author span{
color:#888;
font-size:14px;
}

.article-line{
width:180px;
margin:0 auto 30px;
border:none;
border-top:1px solid #000;
}

.article-sapo{
font-size:24px;
font-weight:500;
line-height:1.7;
margin-bottom:30px;
color:#222;
}

.article-image{
width:100%;
height:auto;
margin:25px 0;
display:block;
border-radius:8px;
}

.article-subtitle{
font-size:32px;
color:#d60000;
margin:30px 0 15px;
font-weight:700;
}

.article-container p{
font-size:22px;
line-height:1.9;
margin-bottom:22px;
color:#222;
}

.back-btn{
display:inline-block;
margin-bottom:40px;
padding:10px 18px;
background:#27b2c5;
color:#fff;
text-decoration:none;
border-radius:5px;
}


@media (max-width:768px){

.article-container{
max-width:100%;
padding:0 15px;
}

.article-title{
font-size:34px;
line-height:1.3;
margin-bottom:20px;
}

.article-sapo{
font-size:18px;
line-height:1.7;
}

.article-subtitle{
font-size:24px;
}

.article-container p{
font-size:18px;
line-height:1.8;
}

.article-author{
font-size:14px;
}

.back-btn{
font-size:14px;
padding:8px 14px;
}

}

@media (max-width:480px){

.article-title{
font-size:28px;
line-height:1.3;
}

.article-sapo{
font-size:17px;
}

.article-subtitle{
font-size:22px;
}

.article-container p{
font-size:17px;
}

.article-category{
font-size:12px;
letter-spacing:2px;
}

.article-line{
width:120px;
}

}
</style>
</head>
<body>



            
            </script>
</body>
</html>
